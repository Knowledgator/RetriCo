<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 710" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bp-node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0d2b"/>
    </linearGradient>
    <linearGradient id="bp-store" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#022c22"/>
    </linearGradient>
    <linearGradient id="bp-optional" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1633"/>
      <stop offset="100%" stop-color="#0f0d2b"/>
    </linearGradient>
    <marker id="bp-arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#818cf8"/>
    </marker>
    <marker id="bp-arrow-dim" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4b5563"/>
    </marker>
    <marker id="bp-arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="710" rx="12" fill="#0f1117"/>

  <!-- Title -->
  <text x="430" y="32" fill="#e5e7eb" font-size="15" font-weight="700" text-anchor="middle" letter-spacing="1.5">BUILD PIPELINE</text>
  <text x="430" y="50" fill="#6b7280" font-size="10" text-anchor="middle">From raw text to a queryable knowledge graph</text>

  <!-- Column headers -->
  <text x="150" y="74" fill="#818cf8" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">PROCESSOR</text>
  <text x="570" y="74" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">DATA AT EACH STAGE</text>

  <!-- ======= ROW 1: INPUT (y=90) ======= -->
  <rect x="40" y="90" width="220" height="46" rx="10" fill="#1f2937" stroke="#4b5563" stroke-width="1.2"/>
  <text x="150" y="110" fill="#e5e7eb" font-size="13" font-weight="700" text-anchor="middle">Input</text>
  <text x="150" y="126" fill="#9ca3af" font-size="10" text-anchor="middle">texts / PDFs / relational store</text>

  <rect x="310" y="90" width="510" height="46" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1"/>
  <text x="326" y="110" fill="#a8a29e" font-size="10" font-style="italic">"Einstein was born in Ulm in 1879. He worked at the</text>
  <text x="326" y="126" fill="#a8a29e" font-size="10" font-style="italic">Institute for Advanced Study in Princeton..."</text>

  <!-- Arrow (gap=20) -->
  <line x1="150" y1="136" x2="150" y2="156" stroke="#818cf8" stroke-width="1.5" marker-end="url(#bp-arrow)"/>

  <!-- ======= ROW 2: CHUNKER (y=158) ======= -->
  <rect x="40" y="158" width="220" height="46" rx="10" fill="url(#bp-node)" stroke="#4338ca" stroke-width="1.2"/>
  <text x="126" y="178" fill="#c7d2fe" font-size="13" font-weight="700" text-anchor="middle">Chunker</text>
  <rect x="184" y="168" width="64" height="18" rx="9" fill="#1e3a5f"/>
  <text x="216" y="181" fill="#7dd3fc" font-size="9" font-weight="600" text-anchor="middle">sentence</text>
  <text x="150" y="196" fill="#818cf8" font-size="9" text-anchor="middle">sentence / paragraph / fixed</text>

  <rect x="310" y="158" width="510" height="46" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1"/>
  <text x="326" y="177" fill="#fbbf24" font-size="10" font-weight="600">Chunk 1:</text>
  <text x="390" y="177" fill="#a8a29e" font-size="10">"Einstein was born in Ulm in 1879."</text>
  <text x="326" y="195" fill="#fbbf24" font-size="10" font-weight="600">Chunk 2:</text>
  <text x="390" y="195" fill="#a8a29e" font-size="10">"He worked at the Institute for Advanced Study..."</text>

  <line x1="150" y1="204" x2="150" y2="224" stroke="#818cf8" stroke-width="1.5" marker-end="url(#bp-arrow)"/>

  <!-- ======= ROW 3: NER (y=226, h=54) ======= -->
  <rect x="40" y="226" width="220" height="54" rx="10" fill="url(#bp-node)" stroke="#4338ca" stroke-width="1.2"/>
  <text x="150" y="248" fill="#c7d2fe" font-size="13" font-weight="700" text-anchor="middle">NER</text>
  <rect x="90" y="256" width="52" height="16" rx="8" fill="#312e81"/>
  <text x="116" y="268" fill="#a5b4fc" font-size="9" font-weight="600" text-anchor="middle">GLiNER</text>
  <text x="155" y="268" fill="#4b5563" font-size="9" text-anchor="middle">/</text>
  <rect x="168" y="256" width="38" height="16" rx="8" fill="#312e81"/>
  <text x="187" y="268" fill="#a5b4fc" font-size="9" font-weight="600" text-anchor="middle">LLM</text>

  <rect x="310" y="226" width="510" height="54" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1"/>
  <text x="326" y="246" fill="#a8a29e" font-size="10">Chunk 1:</text>
  <rect x="380" y="234" width="66" height="18" rx="4" fill="#1e3a5f"/>
  <text x="413" y="247" fill="#7dd3fc" font-size="10" text-anchor="middle">Einstein</text>
  <rect x="454" y="234" width="36" height="18" rx="4" fill="#3b1f5e"/>
  <text x="472" y="247" fill="#c4b5fd" font-size="10" text-anchor="middle">Ulm</text>
  <rect x="498" y="234" width="42" height="18" rx="4" fill="#3a1c1c"/>
  <text x="519" y="247" fill="#fca5a5" font-size="10" text-anchor="middle">1879</text>
  <text x="326" y="270" fill="#a8a29e" font-size="10">Chunk 2:</text>
  <rect x="380" y="258" width="66" height="18" rx="4" fill="#1e3a5f"/>
  <text x="413" y="271" fill="#7dd3fc" font-size="10" text-anchor="middle">Einstein</text>
  <rect x="454" y="258" width="140" height="18" rx="4" fill="#3b1f5e"/>
  <text x="524" y="271" fill="#c4b5fd" font-size="10" text-anchor="middle">Inst. for Adv. Study</text>

  <line x1="150" y1="280" x2="150" y2="300" stroke="#818cf8" stroke-width="1.5" marker-end="url(#bp-arrow)"/>

  <!-- ======= ROW 4: ENTITY LINKER (y=302, h=46) ======= -->
  <rect x="40" y="302" width="220" height="46" rx="10" fill="url(#bp-optional)" stroke="#4338ca" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="122" y="322" fill="#c7d2fe" font-size="13" font-weight="700" text-anchor="middle">Entity Linker</text>
  <rect x="186" y="312" width="52" height="18" rx="9" fill="#1a1633"/>
  <text x="212" y="325" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">optional</text>
  <text x="150" y="340" fill="#818cf8" font-size="9" text-anchor="middle">GLinker — resolve to KB IDs</text>

  <rect x="310" y="302" width="510" height="46" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="326" y="322" fill="#a8a29e" font-size="10">Einstein</text>
  <text x="470" y="322" fill="#4b5563" font-size="10">-></text>
  <text x="490" y="322" fill="#a78bfa" font-size="10">Q937 (Wikidata)</text>
  <text x="326" y="340" fill="#a8a29e" font-size="10">Inst. for Adv. Study</text>
  <text x="470" y="340" fill="#4b5563" font-size="10">-></text>
  <text x="490" y="340" fill="#a78bfa" font-size="10">Q689441 (Wikidata)</text>

  <line x1="150" y1="348" x2="150" y2="368" stroke="#818cf8" stroke-width="1.5" marker-end="url(#bp-arrow)"/>

  <!-- ======= ROW 5: RELEX (y=370, h=54) ======= -->
  <rect x="40" y="370" width="220" height="54" rx="10" fill="url(#bp-node)" stroke="#4338ca" stroke-width="1.2"/>
  <text x="150" y="392" fill="#c7d2fe" font-size="13" font-weight="700" text-anchor="middle">Relation Extraction</text>
  <rect x="90" y="400" width="52" height="16" rx="8" fill="#312e81"/>
  <text x="116" y="412" fill="#a5b4fc" font-size="9" font-weight="600" text-anchor="middle">GLiNER</text>
  <text x="155" y="412" fill="#4b5563" font-size="9" text-anchor="middle">/</text>
  <rect x="168" y="400" width="38" height="16" rx="8" fill="#312e81"/>
  <text x="187" y="412" fill="#a5b4fc" font-size="9" font-weight="600" text-anchor="middle">LLM</text>

  <rect x="310" y="370" width="510" height="54" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1"/>
  <text x="326" y="390" fill="#7dd3fc" font-size="10">Einstein</text>
  <text x="392" y="390" fill="#fb923c" font-size="10" font-weight="600">--BORN_IN--></text>
  <text x="520" y="390" fill="#c4b5fd" font-size="10">Ulm</text>
  <text x="326" y="408" fill="#7dd3fc" font-size="10">Einstein</text>
  <text x="392" y="408" fill="#fb923c" font-size="10" font-weight="600">--WORKED_AT--></text>
  <text x="520" y="408" fill="#c4b5fd" font-size="10">Inst. for Advanced Study</text>
  <text x="326" y="420" fill="#6b7280" font-size="8">+ score, chunk_id per relation</text>

  <line x1="150" y1="424" x2="150" y2="444" stroke="#818cf8" stroke-width="1.5" marker-end="url(#bp-arrow)"/>

  <!-- ======= ROW 6: GRAPH WRITER (y=446, h=50) ======= -->
  <rect x="40" y="446" width="220" height="50" rx="10" fill="url(#bp-node)" stroke="#4338ca" stroke-width="1.2"/>
  <text x="150" y="468" fill="#c7d2fe" font-size="13" font-weight="700" text-anchor="middle">Graph Writer</text>
  <text x="150" y="486" fill="#818cf8" font-size="9" text-anchor="middle">dedup entities + write to store</text>

  <rect x="310" y="446" width="510" height="50" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1"/>
  <text x="326" y="466" fill="#34d399" font-size="10" font-family="monospace">(:Entity {label:"einstein", type:"person"})</text>
  <text x="326" y="482" fill="#34d399" font-size="10" font-family="monospace">(:Entity)-[:BORN_IN]->(:Entity)</text>
  <text x="326" y="494" fill="#34d399" font-size="9" font-family="monospace">(:Entity)-[:MENTIONED_IN]->(:Chunk)-[:PART_OF]->(:Doc)</text>

  <line x1="150" y1="496" x2="150" y2="516" stroke="#818cf8" stroke-width="1.5" marker-end="url(#bp-arrow)"/>

  <!-- ======= ROW 7: EMBEDDER (y=518, h=48) ======= -->
  <rect x="40" y="518" width="220" height="48" rx="10" fill="url(#bp-optional)" stroke="#4338ca" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="122" y="539" fill="#c7d2fe" font-size="13" font-weight="700" text-anchor="middle">Embedder</text>
  <rect x="186" y="529" width="52" height="18" rx="9" fill="#1a1633"/>
  <text x="212" y="542" fill="#a78bfa" font-size="9" font-weight="600" text-anchor="middle">optional</text>
  <text x="150" y="558" fill="#818cf8" font-size="9" text-anchor="middle">chunks + entities -> vectors</text>

  <rect x="310" y="518" width="510" height="48" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="326" y="538" fill="#a8a29e" font-size="10">"Einstein was born in Ulm"</text>
  <text x="550" y="538" fill="#4b5563" font-size="10">-></text>
  <text x="570" y="538" fill="#a78bfa" font-size="10">[0.23, -0.41, 0.87, ...]</text>
  <text x="326" y="556" fill="#a8a29e" font-size="10">"einstein" (entity)</text>
  <text x="550" y="556" fill="#4b5563" font-size="10">-></text>
  <text x="570" y="556" fill="#a78bfa" font-size="10">[0.56, 0.12, -0.33, ...]</text>

  <!-- ======= BOTTOM: STORES + JSON EXPORT (y=600) ======= -->

  <!-- Separator line -->
  <line x1="40" y1="588" x2="820" y2="588" stroke="#1f2937" stroke-width="1"/>

  <!-- JSON Export -->
  <rect x="40" y="610" width="150" height="44" rx="8" fill="#1c1917" stroke="#292524" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="115" y="630" fill="#9ca3af" font-size="11" font-weight="600" text-anchor="middle">JSON Export</text>
  <text x="115" y="646" fill="#6b7280" font-size="9" text-anchor="middle">optional file output</text>

  <!-- Graph Store -->
  <rect x="330" y="610" width="200" height="44" rx="8" fill="url(#bp-store)" stroke="#059669" stroke-width="1.2"/>
  <text x="430" y="630" fill="#a7f3d0" font-size="12" font-weight="700" text-anchor="middle">Graph Store</text>
  <text x="430" y="646" fill="#6ee7b7" font-size="9" text-anchor="middle">Neo4j / FalkorDB / Memgraph</text>

  <!-- Vector Store -->
  <rect x="560" y="610" width="200" height="44" rx="8" fill="url(#bp-store)" stroke="#059669" stroke-width="1.2"/>
  <text x="660" y="630" fill="#a7f3d0" font-size="12" font-weight="700" text-anchor="middle">Vector Store</text>
  <text x="660" y="646" fill="#6ee7b7" font-size="9" text-anchor="middle">FAISS / Qdrant / In-memory</text>

  <!-- Arrow: Graph Writer -> Graph Store -->
  <path d="M 150 496 L 150 496" stroke="none"/>
  <path d="M 260 471 L 290 471 L 290 596 L 430 596 L 430 606" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#bp-arrow-green)"/>

  <!-- Arrow: Embedder -> Vector Store -->
  <path d="M 260 542 L 280 542 L 280 596 L 660 596 L 660 606" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#bp-arrow-green)"/>

  <!-- Arrow: Graph Writer -> JSON Export -->
  <path d="M 40 471 L 20 471 L 20 596 L 115 596 L 115 606" stroke="#4b5563" stroke-width="1" fill="none" marker-end="url(#bp-arrow-dim)" stroke-dasharray="4,3"/>

  <!-- Footer -->
  <text x="430" y="690" fill="#4b5563" font-size="9" text-anchor="middle" letter-spacing="0.5">Configured via Python Builder API, YAML configs, one-liner functions, or CLI</text>
</svg>
