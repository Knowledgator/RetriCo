<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="nodeGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
  </g>

  <!-- ============================================ -->
  <!-- LEFT SIDE: Text document representation      -->
  <!-- ============================================ -->

  <!-- Document background -->
  <rect x="60" y="100" width="180" height="200" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <!-- Document lines (text) -->
  <rect x="78" y="122" width="120" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="138" width="144" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="154" width="100" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="170" width="130" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="186" width="144" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="202" width="90" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="218" width="140" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="234" width="110" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="250" width="144" height="6" rx="3" fill="#475569" opacity="0.7"/>
  <rect x="78" y="266" width="80" height="6" rx="3" fill="#475569" opacity="0.7"/>

  <!-- Highlighted entity spans in the document -->
  <rect x="78" y="135" width="42" height="12" rx="3" fill="#3b82f6" opacity="0.3"/>
  <rect x="130" y="135" width="55" height="12" rx="3" fill="#8b5cf6" opacity="0.3"/>
  <rect x="78" y="167" width="38" height="12" rx="3" fill="#ec4899" opacity="0.3"/>
  <rect x="78" y="199" width="50" height="12" rx="3" fill="#10b981" opacity="0.3"/>
  <rect x="140" y="199" width="40" height="12" rx="3" fill="#f59e0b" opacity="0.3"/>
  <rect x="78" y="247" width="48" height="12" rx="3" fill="#3b82f6" opacity="0.3"/>
  <rect x="140" y="247" width="60" height="12" rx="3" fill="#ec4899" opacity="0.3"/>

  <!-- "Unstructured Text" label -->
  <text x="150" y="88" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Unstructured Text</text>

  <!-- ============================================ -->
  <!-- CENTER: Pipeline arrows                      -->
  <!-- ============================================ -->

  <!-- Arrow from text to graph -->
  <g filter="url(#glow)">
    <path d="M 260 200 C 320 200, 330 160, 390 160" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
    <path d="M 260 200 C 320 200, 330 200, 390 200" fill="none" stroke="url(#accent2)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
    <path d="M 260 200 C 320 200, 330 240, 390 240" fill="none" stroke="url(#accent3)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  </g>

  <!-- Pipeline stage labels -->
  <text x="325" y="145" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">NER</text>
  <text x="325" y="200" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">RELEX</text>
  <text x="325" y="258" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">LINKING</text>

  <!-- ============================================ -->
  <!-- CENTER: Knowledge Graph visualization        -->
  <!-- ============================================ -->

  <!-- Graph edges (drawn first, behind nodes) -->
  <g opacity="0.5">
    <!-- Einstein -> Ulm -->
    <line x1="480" y1="170" x2="570" y2="120" stroke="#3b82f6" stroke-width="1.8"/>
    <!-- Einstein -> Patent Office -->
    <line x1="480" y1="170" x2="580" y2="210" stroke="#8b5cf6" stroke-width="1.8"/>
    <!-- Einstein -> Physics -->
    <line x1="480" y1="170" x2="440" y2="260" stroke="#ec4899" stroke-width="1.8"/>
    <!-- Ulm -> Germany -->
    <line x1="570" y1="120" x2="660" y2="145" stroke="#10b981" stroke-width="1.8"/>
    <!-- Patent Office -> Bern -->
    <line x1="580" y1="210" x2="660" y2="145" stroke="#10b981" stroke-width="1.8"/>
    <!-- Physics -> Relativity -->
    <line x1="440" y1="260" x2="545" y2="280" stroke="#f59e0b" stroke-width="1.8"/>
    <!-- Relativity -> Patent Office -->
    <line x1="545" y1="280" x2="580" y2="210" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4 3"/>
    <!-- Curie -> Physics -->
    <line x1="420" y1="120" x2="440" y2="260" stroke="#ec4899" stroke-width="1.2"/>
    <!-- Curie -> Paris -->
    <line x1="420" y1="120" x2="660" y2="245" stroke="#10b981" stroke-width="1.2"/>
  </g>

  <!-- Edge labels -->
  <text x="518" y="136" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-style="italic">born in</text>
  <text x="536" y="197" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-style="italic">works at</text>
  <text x="616" y="126" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-style="italic">located in</text>
  <text x="448" y="218" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-style="italic">field</text>
  <text x="494" y="278" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-style="italic">developed</text>

  <!-- Graph nodes -->
  <!-- Einstein (person) -->
  <g filter="url(#glow)">
    <circle cx="480" cy="170" r="22" fill="url(#nodeGrad1)"/>
    <text x="480" y="174" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Einstein</text>
  </g>

  <!-- Curie (person) -->
  <g filter="url(#glow)">
    <circle cx="420" cy="120" r="18" fill="url(#nodeGrad1)"/>
    <text x="420" y="124" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" font-weight="600">Curie</text>
  </g>

  <!-- Ulm (location) -->
  <g filter="url(#glow)">
    <circle cx="570" cy="120" r="16" fill="url(#nodeGrad4)"/>
    <text x="570" y="124" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600">Ulm</text>
  </g>

  <!-- Patent Office (org) -->
  <g filter="url(#glow)">
    <circle cx="580" cy="210" r="18" fill="url(#nodeGrad2)"/>
    <text x="580" y="207" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" font-weight="600">Patent</text>
    <text x="580" y="216" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" font-weight="600">Office</text>
  </g>

  <!-- Germany/Bern (location) -->
  <g filter="url(#glow)">
    <circle cx="660" cy="145" r="17" fill="url(#nodeGrad4)"/>
    <text x="660" y="149" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" font-weight="600">Germany</text>
  </g>

  <!-- Physics (concept) -->
  <g filter="url(#glow)">
    <circle cx="440" cy="260" r="17" fill="url(#nodeGrad3)"/>
    <text x="440" y="264" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" font-weight="600">Physics</text>
  </g>

  <!-- Relativity (concept) -->
  <g filter="url(#glow)">
    <circle cx="545" cy="280" r="16" fill="url(#nodeGrad3)"/>
    <text x="545" y="277" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" font-weight="600">Relati-</text>
    <text x="545" y="286" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="6.5" font-weight="600">vity</text>
  </g>

  <!-- Paris (location) -->
  <g filter="url(#glow)">
    <circle cx="660" cy="245" r="15" fill="url(#nodeGrad4)"/>
    <text x="660" y="249" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="7.5" font-weight="600">Paris</text>
  </g>

  <!-- "Knowledge Graph" label -->
  <text x="545" y="88" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500">Knowledge Graph</text>

  <!-- ============================================ -->
  <!-- RIGHT: Arrow to query / answer               -->
  <!-- ============================================ -->

  <g filter="url(#glow)">
    <path d="M 700 200 C 740 200, 750 200, 780 200" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
    <!-- Arrowhead -->
    <polygon points="778,194 790,200 778,206" fill="#3b82f6" opacity="0.6"/>
  </g>

  <text x="745" y="187" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="500">RETRIEVE</text>

  <!-- ============================================ -->
  <!-- RIGHT SIDE: Query + Answer                   -->
  <!-- ============================================ -->

  <!-- Query box -->
  <rect x="800" y="110" width="340" height="44" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="818" y="127" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">Query</text>
  <text x="818" y="144" fill="#e2e8f0" font-family="'SF Mono', 'Fira Code', monospace" font-size="11">"Where was Einstein born?"</text>

  <!-- Retrieval strategies pills -->
  <g transform="translate(800, 168)">
    <rect x="0" y="0" width="64" height="20" rx="10" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="32" y="14" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500">entity</text>

    <rect x="70" y="0" width="50" height="20" rx="10" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="95" y="14" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500">path</text>

    <rect x="126" y="0" width="76" height="20" rx="10" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="164" y="14" text-anchor="middle" fill="#f472b6" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500">community</text>

    <rect x="208" y="0" width="46" height="20" rx="10" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="231" y="14" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500">tool</text>

    <rect x="260" y="0" width="72" height="20" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="296" y="14" text-anchor="middle" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="500">embedding</text>
  </g>

  <!-- Answer box -->
  <rect x="800" y="204" width="340" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="818" y="223" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500">Answer</text>

  <!-- Answer content -->
  <text x="818" y="244" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="11">Albert Einstein was born in</text>
  <text x="818" y="260" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="11"><tspan fill="#34d399" font-weight="600">Ulm, Germany</tspan> in 1879.</text>

  <!-- Evidence chips -->
  <g transform="translate(818, 274)">
    <rect x="0" y="0" width="60" height="16" rx="4" fill="#3b82f6" opacity="0.15"/>
    <text x="30" y="12" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="8">3 entities</text>
    <rect x="66" y="0" width="64" height="16" rx="4" fill="#8b5cf6" opacity="0.15"/>
    <text x="98" y="12" text-anchor="middle" fill="#a78bfa" font-family="system-ui, -apple-system, sans-serif" font-size="8">2 relations</text>
    <rect x="136" y="0" width="60" height="16" rx="4" fill="#10b981" opacity="0.15"/>
    <text x="166" y="12" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="8">1 chunk</text>
  </g>

  <!-- ============================================ -->
  <!-- TITLE overlay (top center)                   -->
  <!-- ============================================ -->

  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" letter-spacing="1">RetriCo</text>
  <text x="600" y="62" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400">Text  &gt;  Knowledge Graph  &gt;  Answers</text>

  <!-- Legend at bottom -->
  <g transform="translate(410, 340)">
    <circle cx="0" cy="0" r="5" fill="url(#nodeGrad1)"/>
    <text x="10" y="4" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Person</text>

    <circle cx="80" cy="0" r="5" fill="url(#nodeGrad4)"/>
    <text x="90" y="4" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Location</text>

    <circle cx="168" cy="0" r="5" fill="url(#nodeGrad2)"/>
    <text x="178" y="4" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Organization</text>

    <circle cx="280" cy="0" r="5" fill="url(#nodeGrad3)"/>
    <text x="290" y="4" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Concept</text>
  </g>
</svg>